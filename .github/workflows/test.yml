name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  structural:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash {0}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Structural validation
        run: ./tests/run-all.sh structural

      - name: install.ps1 parses under PowerShell
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $script = Get-Content -Raw install.ps1
          $null = [scriptblock]::Create($script)

      - name: Cache PSScriptAnalyzer module
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~\Documents\PowerShell\Modules\PSScriptAnalyzer
            ~\Documents\WindowsPowerShell\Modules\PSScriptAnalyzer
          key: psscriptanalyzer-${{ runner.os }}-v1

      - name: PSScriptAnalyzer install.ps1
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          }
          $issues = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error,Warning
          if ($issues) {
            $issues | Format-Table | Out-String | Write-Host
            throw "PSScriptAnalyzer found issues"
          }

  test:
    needs: structural
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        tier: [unit, contract, scenario]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install bash 4+ and GNU parallel (MacOS)
        if: runner.os == 'MacOS'
        run: |
          brew install bash parallel
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Install GNU parallel (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y parallel

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run ${{ matrix.tier }} tests (bash)
        if: runner.os != 'Windows'
        run: ./tests/run-all.sh ${{ matrix.tier }}

      - name: Run ${{ matrix.tier }} tests (pwsh wrapper)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\tests\run-all.ps1 ${{ matrix.tier }}

      - name: Run memory decay eval harness
        if: matrix.tier == 'unit' && runner.os != 'Windows'
        run: ./tests/evals/memory_decay_eval.sh

  e2e:
    needs: structural
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install bash 4+ (macOS)
        if: runner.os == 'MacOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Self-test the smoke harness
        run: python tests/e2e/dry-run-smoke.py --self-test

      - name: Run dry-run e2e smoke (Linux/macOS — 90s budget)
        if: runner.os != 'Windows'
        run: |
          export FORGE_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          python tests/e2e/dry-run-smoke.py --verbose
        timeout-minutes: 2

      - name: Run dry-run e2e smoke (Windows — 180s budget)
        if: runner.os == 'Windows'
        run: |
          export FORGE_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          python tests/e2e/dry-run-smoke.py --verbose
        timeout-minutes: 3

  mutation:
    needs: structural
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install bats dependencies
        run: sudo apt-get install -y parallel

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run mutation harness canary
        run: python -m pytest tests/mutation/test_harness_canary.py -v

      - name: Run seed-row mutation harness
        run: python tests/mutation/state_transitions.py

      - name: Verify REPORT.md is up-to-date
        run: python tests/mutation/state_transitions.py --check

  test-windows-pwsh-structural:
    needs: structural
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install pyyaml jsonschema

      - name: Structural validation (pwsh wrapper)
        run: .\tests\run-all.ps1 structural

  test-windows-cmd:
    needs: structural
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Structural validation (cmd wrapper)
        run: tests\run-all.cmd structural

      - name: Unit tests (cmd wrapper)
        run: tests\run-all.cmd unit

  coverage:
    needs: structural
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Regenerate coverage report
        run: python tests/scenario/report_coverage.py

      - name: Verify COVERAGE.md is up-to-date
        run: python tests/scenario/report_coverage.py --check

      - name: Apply 60%/80% coverage gate on T-* rows
        run: python tests/scenario/report_coverage.py --gate

      - name: Run coverage-reporter canary
        run: python -m pytest tests/mutation/test_coverage_canary.py -v
