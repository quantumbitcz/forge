name: Cross-Platform Tests
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            shell: bash
            name: macOS
          - os: ubuntu-latest
            shell: bash
            name: Ubuntu Linux
          - os: windows-latest
            shell: bash
            name: Windows Git Bash
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }} {0}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install bash 4+ (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Install Python 3 (if missing)
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Check prerequisites
        run: bash shared/check-prerequisites.sh

      - name: Run structural tests
        run: bash tests/run-all.sh structural

      - name: Run unit tests
        run: bash tests/run-all.sh unit

      - name: Run contract tests
        run: bash tests/run-all.sh contract
