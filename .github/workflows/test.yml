name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  structural:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash {0}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Structural validation
        run: ./tests/run-all.sh structural

  test:
    needs: structural
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        tier: [unit, contract, scenario]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install bash 4+ and GNU parallel (MacOS)
        if: runner.os == 'MacOS'
        run: |
          brew install bash parallel
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Install GNU parallel (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y parallel

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Run ${{ matrix.tier }} tests
        run: ./tests/run-all.sh ${{ matrix.tier }}

      - name: Run memory decay eval harness
        if: matrix.tier == 'unit' && runner.os != 'Windows'
        run: ./tests/evals/memory_decay_eval.sh
