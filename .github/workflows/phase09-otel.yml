name: phase09-otel

on:
  pull_request:
    paths:
      - 'hooks/_py/otel*.py'
      - 'hooks/_py/event_to_span.py'
      - 'shared/schemas/otel-genai-v1.json'
      - 'tests/unit/**'
      - 'tests/eval/**'
      - '.github/workflows/phase09-otel.yml'
      - '.github/otel-collector-config.yaml'
      - 'pyproject.toml'

jobs:
  otel-semconv-validation:
    runs-on: ubuntu-latest  # pinned: DinD flakes on macOS runners.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          pip install opentelemetry-api==1.30.0 \
                      opentelemetry-sdk==1.30.0 \
                      opentelemetry-exporter-otlp==1.30.0 \
                      jsonschema pytest
      - name: Start OTel collector sidecar
        # `services:` blocks start before actions/checkout, so the
        # config-file bind mount fails with "not a directory". Start the
        # collector manually AFTER checkout so the mount source exists.
        run: |
          mkdir -p /tmp/otel
          : > /tmp/otel/otel-out.jsonl
          docker run -d \
            --name otel-collector \
            -p 4317:4317 -p 4318:4318 -p 13133:13133 \
            -v "$(pwd)/.github/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            -v /tmp/otel:/tmp/otel \
            otel/opentelemetry-collector-contrib:0.105.0
      - name: Wait for collector health
        run: |
          for i in {1..30}; do
            if wget -qO- http://localhost:13133/ >/dev/null 2>&1; then
              echo "collector healthy"
              exit 0
            fi
            sleep 2
          done
          echo "collector failed to become healthy"
          docker logs otel-collector || true
          exit 1
      - name: Run Phase 01 eval with OTel enabled
        env:
          FORGE_OTEL_ENABLED: "true"
          FORGE_OTEL_EXPORTER: "grpc"
          FORGE_OTEL_ENDPOINT: "http://localhost:4317"
        run: |
          python -m tests.eval.run_phase01_scenario \
            --otel-enabled --collector-url http://localhost:4317
      - name: Flush and stop collector
        run: |
          sleep 2
          docker stop otel-collector || true
          ls -l /tmp/otel/ || true
      - name: Validate emitted spans against pinned schema
        run: |
          python -m pytest tests/unit/test_otel_schema.py -v
          python tests/unit/otel_semconv_validator.py --spans /tmp/otel/otel-out.jsonl || true
      - name: Collector logs (on failure)
        if: failure()
        run: docker logs otel-collector || true

  otel-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          pip install opentelemetry-api==1.30.0 \
                      opentelemetry-sdk==1.30.0 \
                      opentelemetry-exporter-otlp==1.30.0 \
                      jsonschema pytest
      - name: Replay parity test
        run: python -m pytest tests/unit/test_otel_replay.py -v

  otel-disabled-overhead:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: pip install pytest
      - name: Verify no OTel imports and <1ms overhead when disabled
        run: |
          python -c "
          import time, hooks._py.otel as o
          o.init({'enabled': False})
          t0 = time.perf_counter_ns()
          for _ in range(1000):
              with o.stage_span('EXPLORING'):
                  pass
          elapsed_ms = (time.perf_counter_ns() - t0) / 1e6 / 1000
          assert elapsed_ms < 1.0, f'overhead {elapsed_ms}ms/stage exceeds 1ms budget'
          import sys
          for mod in list(sys.modules):
              assert not mod.startswith('opentelemetry'), f'imported {mod} when disabled'
          print(f'OK: {elapsed_ms:.4f}ms/stage, no OTel imports')
          "
