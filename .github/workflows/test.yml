name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify bash 4+
        run: |
          bash --version
          which bash

      - name: Install python3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Structural validation
        run: ./tests/run-all.sh structural

      - name: Unit tests
        run: ./tests/run-all.sh unit

      - name: Contract tests
        run: ./tests/run-all.sh contract

      - name: Scenario tests
        run: ./tests/run-all.sh scenario
