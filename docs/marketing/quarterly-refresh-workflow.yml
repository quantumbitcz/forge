# Canonical source for the quarterly-refresh GitHub Actions workflow.
#
# This file is a TEMPLATE, not an active workflow. It lives under `docs/marketing/`
# rather than `.github/workflows/` so GitHub does NOT register it on the forge repo.
# COPY this file verbatim into forge-reference-deployments/<lib-name>/.github/workflows/quarterly-refresh.yml
# during Phase 15 plan Task 13, then replace the two placeholders:
#
#   <UPSTREAM_TAG>  e.g. v1.4.0
#   <lib-name>      e.g. detect-secrets-patterns
#
# Use this sed invocation (see Phase 15 plan Task 13 Step 2):
#   sed -i.bak -e 's|<UPSTREAM_TAG>|<actual-tag>|g' \
#              -e 's|<lib-name>|<actual-lib-name>|g' \
#       .github/workflows/quarterly-refresh.yml && rm .github/workflows/quarterly-refresh.yml.bak
#
# Spec reference: docs/superpowers/specs/2026-04-19-15-reference-deployment-design.md §8.2
# Plan reference: docs/superpowers/plans/2026-04-19-15-reference-deployment-plan.md Task 13
#
# Cron '0 0 1 */3 *' runs at 00:00 UTC on day 1 of every third month.

name: quarterly-forge-refresh
on:
  schedule:
    - cron: '0 0 1 */3 *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v<UPSTREAM_TAG>-original
          fetch-depth: 0

      - name: Install jq and git
        run: sudo apt-get update && sudo apt-get install -y jq git

      - name: Install forge plugin from quantumbitcz marketplace
        run: |
          # Pseudo-code — the real install path depends on Claude Code's CLI
          # availability in CI. See forge README "Install" section for the
          # authoritative command at the time of refresh.
          git clone --depth=1 https://github.com/quantumbitcz/forge /tmp/forge
          mkdir -p .claude/plugins
          ln -s /tmp/forge .claude/plugins/forge

      - name: Branch off original tag
        run: |
          git config user.name 'forge-refresh-bot'
          git config user.email 'forge-refresh-bot@users.noreply.github.com'
          BRANCH="refresh/$(date +%Y-Q$(( ( $(date +%-m) - 1 ) / 3 + 1 ))_$(date +%s)"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH"

      - name: Run /forge-run (headless)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Exact invocation is whatever the forge CLI / Claude Code CLI provides
          # at the time. See forge docs: /forge-run "Rewrite <lib-name> end-to-end
          # preserving the public API and test contract. Improve internal structure,
          # typing, error handling, and test coverage."
          # This step MUST produce .forge/evidence.json with verdict=SHIP to proceed.
          ./.claude/plugins/forge/shared/forge-sim.sh "quarterly refresh $(date +%F)" || {
            echo "PIPELINE FAILED — labeling regression"
            echo "REGRESSION=1" >> "$GITHUB_ENV"
          }

      - name: Scrub secrets from artifacts
        run: |
          if grep -rE 'sk-ant-|ANTHROPIC_API_KEY|ghp_|gho_|ghs_|AKIA|/home/runner' .forge/ REWRITE_LOG.md 2>/dev/null | grep -v Binary; then
            echo "SCRUB FAILED"
            exit 1
          fi

      - name: Append TRAJECTORY.md
        run: |
          SCORE=$(jq -r '.score' .forge/evidence.json)
          TOKENS=$(jq -r '.tokens' .forge/state.json)
          ELAPSED=$(jq -r '.elapsed' .forge/state.json)
          echo "| $(date +%F) | $SCORE | $TOKENS | $ELAPSED | ${{ env.REGRESSION }} |" >> TRAJECTORY.md

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          git commit -m "chore: quarterly forge-rewrite refresh $(date +%Y-Q$(( ( $(date +%-m) - 1 ) / 3 + 1 )))"
          git push origin "$BRANCH"
          LABELS="quarterly-refresh"
          if [ "${REGRESSION:-0}" = "1" ]; then LABELS="$LABELS,regression"; fi
          gh pr create --title "chore: quarterly forge-rewrite refresh $(date +%Y-Q$(( ( $(date +%-m) - 1 ) / 3 + 1 )))" \
                      --body "Automated quarterly refresh. See TRAJECTORY.md for score/tokens/elapsed trend." \
                      --label "$LABELS" \
                      --base main \
                      --head "$BRANCH"
